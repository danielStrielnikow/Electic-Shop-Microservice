services:
  # ============================================
  # INFRASTRUCTURE SERVICES
  # ============================================

  # PostgreSQL Database
  # Limit: 256MB RAM 
  postgres:
    image: postgres:16-alpine
    container_name: electric_shop_postgres
    environment:
      POSTGRES_DB: electric_shop_db
      POSTGRES_USER: electric_user
      POSTGRES_PASSWORD: electric_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - electric_network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U electric_user -d electric_shop_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  # Limit: 128MB RAM 
  redis:
    image: redis:7-alpine
    container_name: electric_shop_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - electric_network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes

  # Zookeeper (required by Kafka)
  # Limit: 256MB RAM
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: electric_shop_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Ogranicz heap JVM Zookeepera
      KAFKA_HEAP_OPTS: "-Xms64m -Xmx128m"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - electric_network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka Broker
  # Limit: 512MB RAM 
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: electric_shop_kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - electric_network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # Ogranicz heap JVM Kafki — bez tego domyślnie bierze 1GB+
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx400m"
    depends_on:
      zookeeper:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================
  # CONFIG SERVER
  # ============================================

  # Config Server - Centralized Configuration
  # Limit: 256MB RAM / JAVA_OPTS: max 192MB heap (75% z 256MB)
  config-server:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/electric_shop/config_server:latest
    container_name: electric_shop_config_server
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - electric_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=native,docker
      # UseContainerSupport = JVM szanuje limit kontenera
      # MaxRAMPercentage=75 = JVM używa max 75% z przydzielonego RAM (192MB z 256MB)
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ============================================
  # SERVICE DISCOVERY
  # ============================================

  # Eureka Server - Service Discovery
  # Limit: 256MB RAM
  eureka-server:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/electric_shop/eureka_server:latest
    container_name: electric_shop_eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - electric_network
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8761/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ============================================
  # API GATEWAY
  # ============================================

  # API Gateway - Central Entry Point
  # Limit: 384MB RAM — gateway obsługuje cały ruch
  api-gateway:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/electric_shop/api_gateway:latest
    container_name: electric_shop_gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - electric_network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-mZq7vN2jR8kL4pX9wE3hT6sY1bC5fG8aM4nP7qW0uV3xD9rK2gH5tY8eQ1jS6cF4mZq7vN2jR8kL4pX9wE3hT6sY}
      - GRPC_CLIENT_USER_SERVICE_ADDRESS=static://user-service:9091
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ============================================
  # APPLICATION SERVICES
  # ============================================

  # User Service - Authentication & User Management
  # Limit: 384MB RAM — JWT, gRPC, Kafka 
  user-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/electric_shop/user_service:latest
    container_name: electric_shop_user_service
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "9091:9091"  # gRPC port
    networks:
      - electric_network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-server:8888
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=electric_shop_db
      - POSTGRES_USER=electric_user
      - POSTGRES_PASSWORD=electric_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JWT_SECRET=${JWT_SECRET:-mZq7vN2jR8kL4pX9wE3hT6sY1bC5fG8aM4nP7qW0uV3xD9rK2gH5tY8eQ1jS6cF4mZq7vN2jR8kL4pX9wE3hT6sY}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-3600000}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-604800000}
      - HMAC_SECRET=${HMAC_SECRET:-xR9pL2mN8vQ4tY7wE3kS6jH1bC5fG9zX0aM4nP8qW2uV}
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Notification Service - Email Notifications
  # Limit: 256MB RAM — prosty Kafka consumer
  notification-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/electric_shop/notification_service:latest
    container_name: electric_shop_notification_service
    restart: unless-stopped
    ports:
      - "8082:8082"
    networks:
      - electric_network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-server:8888
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM:-noreply@electricshop.pl}
      - PASSWORD_RESET_SUBJECT=${PASSWORD_RESET_SUBJECT:-Reset hasla}
      - PASSWORD_RESET_EXPIRY_MINUTES=${PASSWORD_RESET_EXPIRY_MINUTES:-15}
      - EMAIL_VERIFICATION_SUBJECT=${EMAIL_VERIFICATION_SUBJECT:-Weryfikacja email}
      - EMAIL_VERIFICATION_EXPIRY_MINUTES=${EMAIL_VERIFICATION_EXPIRY_MINUTES:-60}
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Product Service - Product Management
  # Limit: 384MB RAM — gRPC server, JPA, Kafka
  product-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/electric_shop/product_service:latest
    container_name: electric_shop_product_service
    restart: unless-stopped
    ports:
      - "8083:8083"
      - "9090:9090"  # gRPC port
    networks:
      - electric_network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-server:8888
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=electric_shop_db
      - POSTGRES_USER=electric_user
      - POSTGRES_PASSWORD=electric_password
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Cart Service - Shopping Cart Management
  # Limit: 384MB RAM — gRPC client, Redis, JPA
  cart-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/electric_shop/cart_service:latest
    container_name: electric_shop_cart_service
    restart: unless-stopped
    ports:
      - "8084:8084"
    networks:
      - electric_network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      product-service:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-server:8888
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=electric_shop_db
      - POSTGRES_USER=electric_user
      - POSTGRES_PASSWORD=electric_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - GRPC_CLIENT_PRODUCT_SERVICE_ADDRESS=static://product-service:9090
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Order Service - Order Management
  # Limit: 256MB RAM
  order-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/electric_shop/order_service:latest
    container_name: electric_shop_order_service
    restart: unless-stopped
    ports:
      - "8085:8085"
    networks:
      - electric_network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-server:8888
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=electric_shop_db
      - POSTGRES_USER=electric_user
      - POSTGRES_PASSWORD=electric_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Payment Service - Stripe Payments
  # Limit: 256MB RAM
  payment-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/electric_shop/payment_service:latest
    container_name: electric_shop_payment_service
    restart: unless-stopped
    ports:
      - "8086:8086"
    networks:
      - electric_network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-server:8888
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=electric_shop_db
      - POSTGRES_USER=electric_user
      - POSTGRES_PASSWORD=electric_password
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - STRIPE_API_KEY=${STRIPE_API_KEY}
      - STRIPE_PUBLISH_KEY=${STRIPE_PUBLISH_KEY}
      - SECRET_HOOK=${SECRET_HOOK}
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Inventory Service - Stock Management
  # Limit: 256MB RAM
  inventory-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/electric_shop/inventory_service:latest
    container_name: electric_shop_inventory_service
    restart: unless-stopped
    ports:
      - "8087:8087"
      - "9093:9093"  # gRPC port
    networks:
      - electric_network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - CONFIG_SERVER_URL=http://config-server:8888
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=electric_shop_db
      - POSTGRES_USER=electric_user
      - POSTGRES_PASSWORD=electric_password
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - JAVA_OPTS=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -XX:InitialRAMPercentage=50.0
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8087/actuator/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

# Volumes for data persistence
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  kafka_data:
    driver: local
  zookeeper_data:
    driver: local

# Network for microservices
networks:
  electric_network:
    driver: bridge
