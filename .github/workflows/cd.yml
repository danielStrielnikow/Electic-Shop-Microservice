# ============================================================
# CD — Continuous Deployment
# Smart deploy: buduje i restartuje TYLKO zmienione serwisy
# ============================================================
name: CD — Build & Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:

  # ----------------------------------------------------------
  # ETAP 1: Wykryj które serwisy się zmieniły
  # ----------------------------------------------------------
  detect-changes:
    name: "Detect changed services"
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.changed.outputs.services }}
      has_changes: ${{ steps.changed.outputs.has_changes }}
      deploy_only: ${{ steps.changed.outputs.deploy_only }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: changed
        run: |
          ALL=(config_server eureka_server api_gateway user_service product_service cart_service order_service notification_service payment_service inventory_service)
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          # Jeśli zmienił się tylko docker-compose.yml lub inne pliki ops — tylko deploy
          if echo "$CHANGED_FILES" | grep -qE "^docker-compose\.yml$|^\.env$"; then
            if ! echo "$CHANGED_FILES" | grep -qE "^(config_server|eureka_server|api_gateway|user_service|product_service|cart_service|order_service|notification_service|payment_service|inventory_service|common-events)/"; then
              echo "deploy_only=true" >> $GITHUB_OUTPUT
              echo "has_changes=true" >> $GITHUB_OUTPUT
              echo "services=[]" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # Jeśli zmieniły się common-events — przebuduj wszystko
          if echo "$CHANGED_FILES" | grep -q "^common-events/"; then
            echo "Common events changed — rebuilding all services"
            RESULT=$(printf '"%s",' "${ALL[@]}" | sed 's/,$//')
            echo "services=[${RESULT}]" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "deploy_only=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Wykryj zmienione serwisy
          CHANGED=()
          for svc in "${ALL[@]}"; do
            if echo "$CHANGED_FILES" | grep -q "^${svc}/"; then
              CHANGED+=("\"$svc\"")
            fi
          done

          if [ ${#CHANGED[@]} -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "deploy_only=false" >> $GITHUB_OUTPUT
            echo "services=[]" >> $GITHUB_OUTPUT
          else
            RESULT=$(IFS=,; echo "${CHANGED[*]}")
            echo "services=[${RESULT}]" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "deploy_only=false" >> $GITHUB_OUTPUT
          fi

  # ----------------------------------------------------------
  # ETAP 2: Zbuduj JAR-y tylko dla zmienionych serwisów
  # ----------------------------------------------------------
  build-jars:
    name: "Gradle — Build changed JARs"
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && needs.detect-changes.outputs.deploy_only == 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle dependencies
        uses: actions/cache@v4.2.3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build changed JARs
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services }}'
          TASKS=$(echo $SERVICES | tr -d '[]"' | tr ',' '\n' | xargs -I{} echo ":{}:bootJar" | tr '\n' ' ')
          echo "Building: $TASKS"
          ./gradlew $TASKS --no-daemon -x test

      - name: Upload JARs as artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: backend-jars
          path: "**/build/libs/*.jar"
          retention-days: 1

  # ----------------------------------------------------------
  # ETAP 3: Zbuduj i wypchnij obrazy tylko dla zmienionych
  # ----------------------------------------------------------
  build-and-push:
    name: "Docker — ${{ matrix.service }}"
    runs-on: ubuntu-latest
    needs: [detect-changes, build-jars]
    if: needs.detect-changes.outputs.has_changes == 'true' && needs.detect-changes.outputs.deploy_only == 'false'

    strategy:
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Download JARs artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: backend-jars

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set lowercase image prefix
        run: echo "IMAGE_PREFIX_LOWER=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/electric_shop" >> $GITHUB_ENV

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX_LOWER }}/${{ matrix.service }}:latest
            ${{ env.IMAGE_PREFIX_LOWER }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ----------------------------------------------------------
  # ETAP 4: Deploy — restart tylko zmienionych serwisów
  # ----------------------------------------------------------
  deploy:
    name: "Deploy to Azure VM"
    runs-on: ubuntu-latest
    needs: [detect-changes, build-and-push]
    if: |
      always() &&
      needs.detect-changes.outputs.has_changes == 'true' &&
      (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd ~/electric_shop
            echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            git pull origin main

            # Upewnij się że infrastruktura działa (postgres, redis, kafka, zookeeper)
            sudo docker compose up -d postgres redis zookeeper kafka

            DEPLOY_ONLY="${{ needs.detect-changes.outputs.deploy_only }}"
            SERVICES="${{ needs.detect-changes.outputs.services }}"

            if [ "$DEPLOY_ONLY" = "true" ]; then
              # Tylko docker-compose.yml się zmienił — restart bez pull obrazów
              echo "Deploy only — restarting all services..."
              sudo docker compose up -d --remove-orphans
            else
              # Restart tylko zmienionych serwisów
              for svc in $(echo $SERVICES | tr -d '[]"' | tr ',' ' '); do
                COMPOSE_SVC=$(echo $svc | tr '_' '-')
                echo "Updating $COMPOSE_SVC..."
                sudo docker compose pull $COMPOSE_SVC
                sudo docker compose up -d --no-deps $COMPOSE_SVC
              done
            fi

            sudo docker image prune -f
