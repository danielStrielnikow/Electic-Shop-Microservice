name: CI — Build & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — Gradle Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Pobierz kod z repozytorium
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Zainstaluj Javę 21 (ta sama wersja co w Dockerfilach)
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      # 3. Cache dla Gradle — przyspiesza kolejne buildy (~5x szybciej)
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build backend modules
        run: |
          ./gradlew \
            :config_server:bootJar \
            :eureka_server:bootJar \
            :api_gateway:bootJar \
            :user_service:bootJar \
            :product_service:bootJar \
            :cart_service:bootJar \
            :order_service:bootJar \
            :notification_service:bootJar \
            :payment_service:bootJar \
            :inventory_service:bootJar \
            --no-daemon -x test